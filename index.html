<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colosseum — Strength Dashboard</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Colosseum <span class="version">v0.1.1</span></h1>
      <div id="status" class="status">Loading…</div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab is-active" data-tab="leaderboards" role="tab">Leaderboards</button>
      <button class="tab" data-tab="athlete" role="tab">Athlete</button>
    </nav>

    <main>
      <div id="tab-leaderboards" class="tab-panel">
        <section class="controls">
          <label>Exercise
            <select id="exercise"></select>
          </label>
          <label>1RM formula
            <select id="formula">
              <option value="epley">Epley</option>
              <option value="brzycki">Brzycki</option>
            </select>
          </label>
          <label class="check">
            <input type="checkbox" id="excludeDropsets" checked /> Exclude dropsets
          </label>
          <label>PR search
            <input type="search" id="prSearch" placeholder="filter by user or exercise…" />
          </label>
        </section>

        <section class="panel">
          <h2 id="lbTitle">Leaderboard</h2>
          <div class="chart-wrap"><canvas id="lbChart"></canvas></div>
          <table id="lbTable" class="data-table"></table>
        </section>

        <section class="panel">
          <h2>Personal records <span class="muted" id="prCount"></span></h2>
          <table id="prTable" class="data-table"></table>
        </section>

        <section class="panel" id="healthPanel" hidden>
          <h2>Data health</h2>
          <div id="health"></div>
        </section>
      </div>

      <div id="tab-athlete" class="tab-panel" hidden>
        <section class="controls compact">
          <label>Athlete
            <select id="athlete"></select>
          </label>
        </section>

        <nav class="subtabs" role="tablist">
          <button class="subtab is-active" data-subtab="workouts" role="tab">Workouts</button>
          <button class="subtab" data-subtab="exercises" role="tab">Exercises</button>
          <button class="subtab" data-subtab="progress" role="tab">Progress</button>
        </nav>

        <div id="sub-workouts" class="subtab-panel">
          <section class="panel">
            <h2 id="workoutsTitle">Workouts</h2>
            <table id="workoutsTable" class="data-table"></table>
            <div id="workoutsPager" class="pager"></div>
          </section>
        </div>

        <div id="sub-exercises" class="subtab-panel" hidden>
          <section class="panel">
            <h2 id="athleteTitle">Exercises</h2>
            <table id="athleteTable" class="data-table"></table>
            <div id="exercisesPager" class="pager"></div>
          </section>
        </div>

        <div id="sub-progress" class="subtab-panel" hidden>
          <section class="panel">
            <h2 id="progressTitle">Progress over time</h2>
            <label class="inline-label">Exercise
              <select id="progressExercise"></select>
            </label>
            <div class="chart-wrap"><canvas id="progressChart"></canvas></div>
            <p class="muted" id="progressNote"></p>
          </section>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
