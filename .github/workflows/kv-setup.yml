name: Setup shared KV table

# Creates the shared `kv` table (the multi-user browser-cache mirror, CLAUDE.md
# rule 41) via the Supabase MANAGEMENT API — the same mechanism setup-db.yml used
# to create `sets` (DDL needs elevated creds the anon key doesn't have). Runs the
# DDL in supabase/kv-table.sql; idempotent (create table if not exists). The owner
# never touches Supabase (rule 42).

on:
  push:
    branches: [opus-4.8]
    paths:
      - supabase/kv-table.sql
      - .github/workflows/kv-setup.yml
  workflow_dispatch:

jobs:
  kv-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kv table via Supabase Management API
        run: |
          SQL=$(cat supabase/kv-table.sql)
          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/nbjgwqytwkkuarxlkmnj/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP $CODE: $BODY"
          if [[ "$CODE" != "200" && "$CODE" != "201" ]]; then exit 1; fi
          echo "✓ kv table ready + anon granted"
