name: Keep Supabase alive

on:
  schedule:
    - cron: "0 10 * * 1,4" # every Monday and Thursday at 10:00 UTC

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping sets table
        run: |
          curl -s \
            "https://nbjgwqytwkkuarxlkmnj.supabase.co/rest/v1/sets?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            > /dev/null
          echo "✓ Supabase pinged"
