name: Deploy to Netlify

# Pushes a fresh dist/ to coloseum.netlify.app when git-linked Netlify builds are
# skipped (build hooks bypass the ignore step; direct deploy bypasses git entirely).
on:
  push:
    branches: [opus-4.8]
  workflow_dispatch:

concurrency:
  group: netlify
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[pages-index]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/verify-dist.cjs

      - name: Trigger Netlify build hook
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -n "$NETLIFY_BUILD_HOOK" ]; then
            curl -fsS -X POST -d {} "$NETLIFY_BUILD_HOOK"
            echo "Netlify build hook triggered"
          else
            echo "NETLIFY_BUILD_HOOK not configured — add a hook URL in repo secrets"
          fi

      - name: Deploy dist to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: d506a042-d3e1-4343-b7a6-ec322f731369
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::warning::NETLIFY_AUTH_TOKEN not set — add a personal access token in repo secrets"
            exit 0
          fi
          npx --yes netlify-cli@23.4.3 deploy --prod --dir=dist --site="$NETLIFY_SITE_ID"
