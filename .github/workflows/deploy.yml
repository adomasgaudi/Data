name: Deploy to GitHub Pages

# Rebuilds and publishes the dashboard on every push to the working branch, so
# the live URL always reflects the latest commit — just refresh the page.
on:
  push:
    branches: [opus-4.8]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/verify-dist.cjs
      # Legacy branch deploy (opus-4.8 /) serves raw index.html — absolute /src/…
      # paths 404 on adomasgaudi.github.io/Colosseum/ (mobile shows unstyled HTML).
      # Force GitHub Actions as the Pages source so dist/ (single-file build) goes live.
      - name: Use GitHub Actions for Pages
        run: |
          CURRENT=$(gh api "repos/${{ github.repository }}/pages" --jq '.build_type')
          echo "Pages build_type: $CURRENT"
          if [ "$CURRENT" != "workflow" ]; then
            gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow
            echo "Switched Pages to GitHub Actions deploy"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
