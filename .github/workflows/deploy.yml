name: Deploy to GitHub Pages

# Rebuilds and publishes the dashboard on every push to the working branch, so
# the live URL always reflects the latest commit — just refresh the page.
on:
  push:
    branches: [opus-4.8]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[pages-index]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/verify-dist.cjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # Legacy Pages deploy serves opus-4.8 / (not the Actions artifact). Publish the
      # single-file build as root index.html so github.io/Colosseum/ gets inlined CSS/JS.
      - name: Publish built index.html to branch
        run: |
          cp dist/index.dev.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "index.html already up to date"
          else
            git commit -m "deploy: publish built index.html [pages-index]"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
