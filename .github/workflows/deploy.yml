name: Deploy to GitHub Pages

# Rebuilds and publishes the dashboard on every push to the working branch, so
# the live URL always reflects the latest commit — just refresh the page.
on:
  push:
    branches: [claude/strength-training-dashboard-SdAlT]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
