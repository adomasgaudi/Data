name: DB diagnostic query

# One-off read-only diagnostic (rule 42 — owner never touches the backend): checks
# whether the Thursday sets the owner flagged as "not synced" actually reached the
# cloud `sets` table, to split an UPLOAD bug from a DOWNLOAD/merge bug. Read-only
# SELECT via the Supabase Management API. Safe to delete after.

on:
  push:
    branches: [opus-4.8]
    paths:
      - .github/workflows/db-query.yml
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: SELECT flagged sets from cloud
        run: |
          SQL="select username, date, exercise_name, set_number, weight, reps, left(notes,50) as notes from sets where exercise_name in ('L-SIT','Dips','Dumbbell Bench Press') and date >= '2026-06-10' order by date desc, exercise_name;"
          RESP=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.supabase.com/v1/projects/nbjgwqytwkkuarxlkmnj/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          echo "HTTP $(echo "$RESP" | tail -1)"
          echo "ROWS: $(echo "$RESP" | head -n -1)"
          echo "---"
          echo "COUNT total manual sets in cloud:"
          SQL2="select count(*) as manual_sets from sets where set_number >= 100000000;"
          curl -s -X POST "https://api.supabase.com/v1/projects/nbjgwqytwkkuarxlkmnj/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL2" | jq -Rs .)}"
