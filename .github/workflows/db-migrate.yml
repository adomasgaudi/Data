name: Apply DB Migrations

on:
  push:
    branches: [claude/strength-training-dashboard-SdAlT]
    paths:
      - supabase/migrations/**

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "→ $f"
            psql "$DATABASE_URL" -f "$f" -v ON_ERROR_STOP=1
          done
        env:
          # Session-mode pooler (IPv4, port 5432) — avoids the IPv6 "unreachable" issue
          # with the direct db.*.supabase.co host on GitHub Actions runners.
          DATABASE_URL: postgresql://postgres.nbjgwqytwkkuarxlkmnj:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
